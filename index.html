  :root {
    --bg: #101010;
    --accent: #fde8cb;
    --dash-fill: #a17148;
    --dot-active: #2ecc71;
    --dash-active: #ff3b30;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--accent);
    font-family: Arial, sans-serif;
    height: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .app {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    height: 100%;
    padding-bottom: 140px;
  }
  .decoded-letter {
    position: fixed;
    top: 132px;
    left: 0; right: 0;
    max-width: 430px;
    margin: 0 auto;
    text-align: center;
    font-family: 'SuisseIntlMedium', sans-serif;
    font-size: 64px;
    font-weight: 500;
    color: #FDE8CB;
    line-height: 1;
    padding: 0 16px;
    word-break: break-all;
    text-transform: lowercase;
    z-index: 1;
  }
  .tree-wrap {
    position: fixed;
    bottom: calc(90px + env(safe-area-inset-bottom));
    height: 549px;
    left: 0; right: 0;
    max-width: 430px;
    margin: 0 auto;
    overflow: visible;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    z-index: 1;
  }
  .tree {
    position: relative;
    width: 430px;
    height: 660px;
    flex-shrink: 0;
    transform-origin: top center;
    margin-top: -130px;
  }
  @media (max-width: 430px) {
    .tree { transform: scale(calc(100vw / 430)); }
  }

  .tree-card {
    position: fixed;
    bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    height: 511px;
    border-radius: 44px;
    background:
      linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0)),
      #1B1B1B;
    box-shadow:
      0 4px 13px rgba(0,0,0,0.08),
      inset 0 4px 6px rgba(255,255,255,0.02),
      inset 0 -4px 6px rgba(0,0,0,0.30);
    overflow: hidden;
    z-index: 0;
  }
  .tree-card::after {
    content: '';
    position: absolute;

<script>

const LABELS = [

const H_LINES = [

  { x: 329, y: 341, h: 18 }, { x: 179, y: 342, h: 115 }, { x: 179, y: 488, h: 60 }, { x: 247, y: 491, h: 55 }, { x: 247, y: 342, h: 115 }, { x: 126, y: 487, h: 18 },

const tree = document.getElementById('tree');

const antWrap = document.createElement('div');

antWrap.appendChild(antStem);

H_LINES.forEach(l => {
  const el = document.createElement('div');
  el.className = 'line';
  el.style.cssText = `left:${l.x}px;top:${l.y}px;width:${l.w}px;height:4px;`;
  tree.appendChild(el);
});
V_LINES.forEach(l => {
  const el = document.createElement('div');
  el.className = 'line';
  el.style.cssText = `left:${l.x}px;top:${l.y}px;width:3px;height:${l.h}px;`;
  tree.appendChild(el);
});

const nodeElements = {};
NODES.forEach(n => {
  const el = document.createElement('div');
  el.className = (n.type === 'dot') ? 'dot' : (n.type === 'dash-v' ? 'dash vertical' : 'dash');
  el.style.left = n.x + 'px';
  el.style.top = n.y + 'px';
  el.dataset.morse = n.morse;
  el.dataset.letter = n.id;
  tree.appendChild(el);
  nodeElements[n.morse] = el;
});

LABELS.forEach(([letter, x, y]) => {
  const el = document.createElement('div');
  el.className = 'letter';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.textContent = letter;
  tree.appendChild(el);
});

const MORSE_TO_LETTER = {};
NODES.forEach(n => { MORSE_TO_LETTER[n.morse] = n.id; });

const DOT_MAX_MS = 200;
const LETTER_PAUSE_MS = 600;
const WORD_PAUSE_MS = 3000;

const keyBtn = document.getElementById('keyBtn');
const decodedEl = document.getElementById('decoded');
const currentEl = document.getElementById('current');
const clearBtn = document.getElementById('clearBtn');

let pressStart = 0;
let currentMorse = '';
let letterTimer = null;
let wordTimer = null;
let activeNodes = [];
let previewNodes = [];
let previewTimer = null;

let audioCtx = null;
let toneNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('touchstart', initAudio, { once: true, passive: true });
document.addEventListener('mousedown', initAudio, { once: true });

function startTone() {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (toneNode) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 700;
  gain.gain.value = 0.5;
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  toneNode = { osc, gain };
}

function stopTone() {
  if (!toneNode) return;
  const { osc, gain } = toneNode;
  gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.001);
  setTimeout(() => { try { osc.stop(); } catch(e){} }, 10);
  toneNode = null;
}

function clearActiveNode() {
  activeNodes.forEach(el => el.classList.remove('active'));
  activeNodes = [];
}
function highlightCurrent() {
  clearActiveNode();
  if (!currentMorse) return;
  for (let i = 1; i <= currentMorse.length; i++) {
    const el = nodeElements[currentMorse.slice(0, i)];
    if (el) { el.classList.add('active'); activeNodes.push(el); }
  }
}
function updateDecodedDisplay() {
  const preview = currentMorse ? (MORSE_TO_LETTER[currentMorse] || '') : '';
  document.getElementById('committedSpan').textContent = decodedEl.textContent;
  document.getElementById('previewSpan').textContent = preview;
}
function updateDeleteButtons() {
  const hasAny = decodedEl.textContent.length > 0 || !!(currentMorse && MORSE_TO_LETTER[currentMorse]);
  document.getElementById('deleteBinBtn').classList.toggle('visible', hasAny);
  document.getElementById('deleteBackBtn').classList.toggle('visible', hasAny);
}
function deleteBack() {
  if (!decodedEl.textContent.length) return;
  decodedEl.textContent = decodedEl.textContent.slice(0, -1);
  updateDecodedDisplay();
  updateDeleteButtons();
}
function deleteLastWord() {
  const trimmed = decodedEl.textContent.trimEnd();
  if (!trimmed.length) { decodedEl.textContent = ''; }
  else {
    const lastSpace = trimmed.lastIndexOf(' ');
    decodedEl.textContent = lastSpace === -1 ? '' : trimmed.slice(0, lastSpace);
  }
  updateDecodedDisplay();
  updateDeleteButtons();
}

let backPressStart = 0;
let backLongTimer = null;
let backRepeatTimer = null;
const BACK_LONG_MS = 400;
const BACK_REPEAT_MS = 600;
function onBackStart(e) {
  e.preventDefault();
  backPressStart = Date.now();
  document.getElementById('deleteBackBtn').classList.add('pressed');
  backLongTimer = setTimeout(() => {
    deleteLastWord();
    backRepeatTimer = setInterval(() => {

      deleteLastWord();
    }, BACK_REPEAT_MS);
  }, BACK_LONG_MS);
}
function onBackEnd(e) {
  e.preventDefault();
  const dur = Date.now() - backPressStart;
  clearTimeout(backLongTimer);
  clearInterval(backRepeatTimer);
  backPressStart = 0; backLongTimer = null; backRepeatTimer = null;
  document.getElementById('deleteBackBtn').classList.remove('pressed');

function deleteLastWord() {
  const trimmed = decodedEl.textContent.trimEnd();
  if (!trimmed.length) { decodedEl.textContent = ''; }
  else {
    const lastSpace = trimmed.lastIndexOf(' ');
    decodedEl.textContent = lastSpace === -1 ? '' : trimmed.slice(0, lastSpace);

  updateDeleteButtons();

function deleteAll() {

  currentEl.textContent = '';
  clearActiveNode();
  clearTimeout(letterTimer);
  clearTimeout(wordTimer);
  updateDecodedDisplay();
  updateDeleteButtons();
}

function commitLetter() {
  if (!currentMorse) return;
  const letter = MORSE_TO_LETTER[currentMorse];
  if (!letter) { currentMorse = ''; currentEl.textContent = ''; clearActiveNode(); updateDeleteButtons(); return; }
  decodedEl.textContent += letter;
  currentMorse = '';
  currentEl.textContent = '';
  clearActiveNode();
  updateDecodedDisplay();
  updateDeleteButtons();
}
function commitWord() {
  commitLetter();
  if (decodedEl.textContent.length && !decodedEl.textContent.endsWith(' ')) {

    updateDecodedDisplay();

function addSymbol(sym) {
  currentMorse += sym;

  updateDecodedDisplay();
  updateDeleteButtons();
  clearTimeout(letterTimer);

function showDashPreview() {
  previewNodes.forEach(el => { if (!activeNodes.includes(el)) el.classList.remove('active'); });
  previewNodes = [];
  const m = currentMorse + '-';
  for (let i = 1; i <= m.length; i++) {
    const el = nodeElements[m.slice(0, i)];
    if (el) { el.classList.add('active'); previewNodes.push(el); }
  }
}
function clearPreview() {
  if (previewTimer) { clearTimeout(previewTimer); previewTimer = null; }
  previewNodes.forEach(el => { if (!activeNodes.includes(el)) el.classList.remove('active'); });
  previewNodes = [];
}

function onPressStart(e) {
  if (e && e.preventDefault) e.preventDefault();
  if (pressStart) return;
  pressStart = Date.now();
  keyBtn.classList.add('pressed');
  antWrap.classList.add('active');
  clearTimeout(letterTimer);
  clearTimeout(wordTimer);
  document.getElementById('deleteBinBtn').classList.add('visible');

function onPressEnd(e) {

  if (!pressStart) return;
  const dur = Date.now() - pressStart;
  pressStart = 0;
  keyBtn.classList.remove('pressed');
  antWrap.classList.remove('active');
  stopTone();
  clearPreview();
  addSymbol(dur < DOT_MAX_MS ? '.' : '-');

const binBtn = document.getElementById('deleteBinBtn');
const binWrap = binBtn.closest('.btn-wrap');
binBtn.addEventListener('click', () => binWrap.classList.toggle('lit'));
binBtn.addEventListener('dblclick', e => e.preventDefault());
binBtn.addEventListener('mousedown', () => binBtn.classList.add('pressed'));
binBtn.addEventListener('mouseup', () => binBtn.classList.remove('pressed'));
binBtn.addEventListener('mouseleave', () => binBtn.classList.remove('pressed'));
binBtn.addEventListener('touchstart', () => binBtn.classList.add('pressed'), { passive: true });
binBtn.addEventListener('touchend', () => binBtn.classList.remove('pressed'), { passive: true });
binBtn.addEventListener('touchcancel', () => binBtn.classList.remove('pressed'), { passive: true });
const backBtn = document.getElementById('deleteBackBtn');
backBtn.addEventListener('mousedown', onBackStart);
backBtn.addEventListener('mouseup', onBackEnd);
backBtn.addEventListener('mouseleave', e => { if (backPressStart) onBackEnd(e); });
backBtn.addEventListener('touchstart', onBackStart, { passive: false });
backBtn.addEventListener('touchend', onBackEnd, { passive: false });

keyBtn.addEventListener('mousedown', onPressStart);
keyBtn.addEventListener('mouseup', onPressEnd);
keyBtn.addEventListener('mouseleave', (e) => { if (pressStart) onPressEnd(e); });
keyBtn.addEventListener('touchstart', onPressStart, { passive: false });
keyBtn.addEventListener('touchend', onPressEnd, { passive: false });
keyBtn.addEventListener('touchcancel', onPressEnd, { passive: false });

let keyDown = false;
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (keyDown) return;
    keyDown = true;
    onPressStart(e);
  }
  if (e.code === 'Backspace') {
    e.preventDefault();
    onBackStart(e);
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    keyDown = false;
    onPressEnd(e);
  }
  if (e.code === 'Backspace') {
    e.preventDefault();
    onBackEnd(e);
  }
});

clearBtn && clearBtn.addEventListener('click', () => {
  decodedEl.textContent = '';
  currentMorse = '';
  currentEl.textContent = '';
  clearActiveNode();
  clearTimeout(letterTimer);
  clearTimeout(wordTimer);
  updateDecodedDisplay();
  updateDeleteButtons();
});
